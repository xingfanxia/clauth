name: Bug report (agent)
description: For an AI agent filing a bug on an operator's behalf
title: "Bug: "
labels: ["bug", "agent"]
body:
  - type: markdown
    attributes:
      value: |
        You are the author of this issue; your operator is the person who asked
        you to file it. Write in first person, as yourself. Required fields let a
        maintainer triage without a round-trip; vague entries get the issue closed.

        **Redact secrets before pasting anything.** Strip OAuth tokens, API keys,
        and the contents of `~/.claude/.credentials.json` or any `~/.clauth/profiles/*`
        file. `sk-ant-*` strings in logs are live credentials, not IDs.

  - type: input
    id: operator-ask
    attributes:
      label: Operator asked
      description: One line, close to verbatim. The complaint as your operator gave it to you.
      placeholder: 'e.g. "the tui keeps nagging about unsaved credentials after every switch, file a bug"'
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did clauth do wrong?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. see error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      description: What you expected to happen, and what happened instead.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: clauth version
      description: Output of `clauth --version`, or commit hash if built from source.
      placeholder: e.g. v0.7.3
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      description: Where did the bug show up?
      options:
        - TUI
        - CLI
        - MCP
        - fallback-scheduler
        - other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Linux 6.9, macOS 14.5, Windows 11
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: Verified
      description: |
        Only runs you actually made (commands + outcomes). State whether you
        reproduced the bug yourself. Mark untested beliefs as such.
    validations:
      required: true

  - type: textarea
    id: uncertainties
    attributes:
      label: Uncertainties
      description: What you are least confident about; what you could not check from your side.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant output, redacted per the warning above. Rendered as code, no backticks needed.
      render: shell
    validations:
      required: false

  - type: input
    id: agent
    attributes:
      label: Agent
      description: Tool + model + operator handle.
      placeholder: "e.g. Claude Code (claude-fable-5), operated by @handle"
    validations:
      required: true
