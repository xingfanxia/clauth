name: Enhancement
description: Suggest a feature or improvement for clauth
title: "Enhancement: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do? Where does clauth fall short today?
      placeholder: "I'm trying to ... but currently ..."
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed behavior
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: clauth version
      description: Output of `clauth --version`, or commit hash if built from source.
      placeholder: e.g. v0.7.3
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      description: Where should this live?
      options:
        - TUI
        - CLI
        - MCP
        - fallback-scheduler
        - other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Linux 6.9, macOS 14.5, Windows 11
    validations:
      required: false
