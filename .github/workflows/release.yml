name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-windows:
    name: Build ${{ matrix.asset_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_name: clauth-linux-x86_64
            ext: ''
          - target: x86_64-pc-windows-gnu
            asset_name: clauth-windows-x86_64
            ext: .exe

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install mingw (Windows target)
        if: matrix.ext == '.exe'
        run: sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare asset (Unix)
        if: matrix.ext == ''
        run: cp target/${{ matrix.target }}/release/clauth ${{ matrix.asset_name }}

      - name: Prepare asset (Windows)
        if: matrix.ext == '.exe'
        run: cp target/${{ matrix.target }}/release/clauth.exe ${{ matrix.asset_name }}.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.asset_name }}${{ matrix.ext }}
          generate_release_notes: true

  build-macos:
    name: Build ${{ matrix.asset_name }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            asset_name: clauth-macos-aarch64
          - target: x86_64-apple-darwin
            asset_name: clauth-macos-x86_64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare asset
        run: cp target/${{ matrix.target }}/release/clauth ${{ matrix.asset_name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true
