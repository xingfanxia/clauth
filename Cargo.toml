[package]
name = "clauth"
version = "0.1.7"
edition = "2024"
description = "A simple Claude Code account switcher - swap OAuth and API profiles in an instant"
license = "MIT"
repository = "https://github.com/uwuclxdy/clauth"
homepage = "https://github.com/uwuclxdy/clauth"
readme = "README.md"
keywords = ["claude-code", "account-switch", "cli", "profiles", "anthropic"]
categories = ["command-line-utilities"]

[dependencies]
crossterm = "0.29.0"
inquire = "0.9.4"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.149", features = ["preserve_order"] }
toml = "1.1.2"
anyhow = "1.0.102"
dirs = "6.0.0"
ureq = "3.3.0"
self-replace = "1.5.0"
