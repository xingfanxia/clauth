[package]
name = "clauth"
version = "0.4.1"
edition = "2024"
description = "Simple Claude Code account switcher and usage monitor"
license = "MIT"
repository = "https://github.com/uwuclxdy/clauth"
homepage = "https://github.com/uwuclxdy/clauth"
readme = "README.md"
keywords = ["claude-code", "account-switch", "cli", "profiles", "anthropic"]
categories = ["command-line-utilities"]

[dependencies]
ratatui = "0.30.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.150", features = ["preserve_order"] }
toml = "1.1.2"
anyhow = "1.0.102"
dirs = "6.0.0"
ureq = "3.3.0"
self-replace = "1.5.0"
signal-hook = "0.3.18"
tempfile = "3.27.0"
libc = "0.2.186"
